interface:
  display_name: "Find Open Source Solutions"
  short_description: "Discover and compare GitHub solution stacks"
  default_prompt: "Use $find-open-source-solutions to recommend an existing open-source GitHub solution for my goal."

dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "Read-only GitHub repository discovery, code search, and current metadata"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp/x/repos/readonly"
    - type: "mcp"
      value: "context7"
      description: "Semantic retrieval over repository code and official documentation"
      transport: "streamable_http"
      url: "https://mcp.context7.com/mcp"

policy:
  allow_implicit_invocation: true
